name: Build Pake App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Pake
        run: npm install -g pake-cli

      - name: Build EXE
        run: pake Sharjeel_Content_Planner.zip --name "SharjeelPlanner" --targets windows

      - name: Upload EXE
        uses: actions/upload-artifact@v3
        with:
          name: SharjeelPlanner-Windows
          path: "*.exe"
